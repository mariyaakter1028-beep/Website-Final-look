</head>
<body>

<div class="sidebar">
    <h2>🚀 Panel Hub</h2>

    <a href="index.html">🏠 Dashboard</a>
    <a href="panels.html">🛒 Buy Panel</a>
    <a href="orders.html">📦 My Orders</a>

<div class="main">

    <div class="header">
        <h1>💰 Payment Methods</h1>
    </div>

    <div class="section">

        <div class="panel-box">
            <h3>📱 bKash</h3>
            <p>Number: 017XXXXXXXX</p>
            <p>Type: Personal</p>
        </div>

        <div class="panel-box">
            <h3>📱 Nagad</h3>
            <p>Number: 018XXXXXXXX</p>
            <p>Type: Personal</p>
        </div>

        <div class="panel-box">
            <h3>🪙 Binance Pay</h3>
            <p>Binance ID: 123456789</p>
        </div>

        <div class="panel-box">
            <h3>📝 Submit Payment</h3>

            <form>
                <label>Panel Name</label><br>
                <input type="text" placeholder="Enter panel name"><br><br>

                <label>Transaction ID</label><br>
                <input type="text" placeholder="Enter transaction ID"><br><br>

                <label>Amount</label><br>
                <input type="text" placeholder="Enter amount"><br><br>

                <button type="submit" class="btn">
                    Submit Payment
                </button>
            </form>

        </div>

    </div>

</div>

</body>
