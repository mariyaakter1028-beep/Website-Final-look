<div class="main">

    <div class="header">
        <h1>📞 Support Center</h1>
    </div>

    <div class="section">

        <div class="panel-box">
            <h3>Telegram Support</h3>
            <p>@yourusername</p>
        </div>

        <div class="panel-box">
            <h3>WhatsApp Support</h3>
            <p>+8801XXXXXXXXX</p>
        </div>

        <div class="panel-box">
            <h3>Email Support</h3>
            <p>support@example.com</p>
        </div>

        <div class="panel-box">
            <h3>Send Message</h3>

            <form>
                <input type="text" placeholder="Your Name" required><br><br>

                <input type="email" placeholder="Your Email" required><br><br>

                <textarea placeholder="Write your message here..." rows="5"></textarea><br><br>

                <button type="submit" class="btn">
                    Send Message
                </button>
            </form>
        </div>

    </div>

</div>
